<script>

const API_KEY = "AIzaSyCkXxAwclbh1iPIwESih_posvOEWiKNzN8";

async function sendMessage(){

const input = document.getElementById("text");
const chat = document.getElementById("chat");

const text = input.value.trim();

if(!text) return;

chat.innerHTML += `
<div class="msg user">${text}</div>
`;

chat.innerHTML += `
<div class="typing" id="typing">AI typing...</div>
`;

chat.scrollTop = chat.scrollHeight;

input.value = "";

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${API_KEY}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{
text:"Give accurate, clear and helpful answers: " + text
}
]
}
]

})

}
);

const data = await response.json();

console.log(data);

if(document.getElementById("typing")){
document.getElementById("typing").remove();
}

let reply = "⚠️ No response from AI.";

if(
data.candidates &&
data.candidates.length > 0 &&
data.candidates[0].content.parts.length > 0
){

reply = data.candidates[0].content.parts[0].text;

}

else if(data.error){

reply = "❌ " + data.error.message;

}

chat.innerHTML += `
<div class="msg bot">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

}

catch(error){

if(document.getElementById("typing")){
document.getElementById("typing").remove();
}

chat.innerHTML += `
<div class="msg bot">❌ Error connecting to AI.</div>
`;

console.log(error);

}

}

document.getElementById("text").addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendMessage();
}

});

  </script>
