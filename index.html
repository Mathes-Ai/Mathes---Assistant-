<script>  
  
const chatArea = document.getElementById("chatArea");  
const input = document.getElementById("userInput");  
  
// 🔑 Paste your Gemini API key below  
const API_KEY = "AIzaSyAUenezXCJRKOAzRdxW4ZbzKaFXHuqFNcI;  
  
async function sendMessage(){  
  
const text = input.value.trim();  
  
if(text === "") return;  
  
chatArea.innerHTML += `  
<div class="message user">${text}</div>  
`;  
  
chatArea.innerHTML += `  
<div class="typing" id="typing">Mathes AI typing...</div>  
`;  
  
chatArea.scrollTop = chatArea.scrollHeight;  
  
input.value = "";  
  
try{  
  
const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,  
{  
method:"POST",  
headers:{  
"Content-Type":"application/json"  
},  
body:JSON.stringify({  
contents:[  
{  
parts:[  
{  
text:text  
}  
]  
}  
]  
})  
});  
  
const data = await response.json();  
  
let reply = "⚠️ AI did not respond.";  
  
if(data.candidates && data.candidates.length > 0){  
reply = data.candidates[0].content.parts[0].text;  
}  
  
document.getElementById("typing").remove();  
  
chatArea.innerHTML += `  
<div class="message bot">${reply}</div>  
`;  
  
chatArea.scrollTop = chatArea.scrollHeight;  
  
}  
  
catch(error){  
  
if(document.getElementById("typing")){  
 document.getElementById("typing").remove();  
}  
  
chatArea.innerHTML += `  
<div class="message bot">❌ Error connecting to AI.</div>  
`;  
  
console.log(error);  
  
}  
  
}  
  
function clearChat(){  
  
chatArea.innerHTML = `  
<div class="message bot">  
🚀 Welcome to Mathes Nova AI<br>  
Your intelligent futuristic assistant is now online.  
</div>  
`;  
  
}  
  
input.addEventListener("keypress",function(e){  
if(e.key === "Enter"){  
sendMessage();  
}  
});  
  
const canvas = document.getElementById("bg");  
const ctx = canvas.getContext("2d");  
  
canvas.width = window.innerWidth;  
canvas.height = window.innerHeight;  
  
let particles = [];  
  
for(let i=0;i<120;i++){  
particles.push({  
x:Math.random()*canvas.width,  
y:Math.random()*canvas.height,  
r:Math.random()*2,  
dx:(Math.random()-0.5),  
dy:(Math.random()-0.5)  
});  
}  
  
function animate(){  
ctx.clearRect(0,0,canvas.width,canvas.height);  
ctx.fillStyle = "cyan";  
  
particles.forEach(p=>{  
ctx.beginPath();  
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);  
ctx.fill();  
  
p.x += p.dx;  
p.y += p.dy;  
  
if(p.x<0 || p.x>canvas.width) p.dx *= -1;  
if(p.y<0 || p.y>canvas.height) p.dy *= -1;  
});  
  
requestAnimationFrame(animate);  
}  
  
animate();  
  
  </script>
