<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathes Nova AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.ai-box{
width:100%;
max-width:800px;
height:92vh;
background:rgba(10,10,10,0.92);
border:1px solid rgba(0,255,255,0.2);
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(0,255,255,0.15);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:22px;
text-align:center;
background:#0f0f0f;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.header h1{
font-size:34px;
color:cyan;
}

.header p{
margin-top:6px;
font-size:14px;
color:#aaa;
}

.chat-area{
flex:1;
padding:20px;
overflow-y:auto;
scroll-behavior:smooth;
}

.message{
max-width:85%;
padding:15px;
margin:12px 0;
border-radius:18px;
line-height:1.5;
animation:fade 0.3s ease;
word-wrap:break-word;
}

.bot{
background:#1a1a1a;
border:1px solid rgba(0,255,255,0.2);
}

.user{
background:cyan;
color:black;
margin-left:auto;
font-weight:bold;
}

.input-area{
display:flex;
padding:15px;
background:#111;
border-top:1px solid rgba(255,255,255,0.08);
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:#1b1b1b;
color:white;
font-size:16px;
}

button{
margin-left:10px;
padding:15px 24px;
border:none;
border-radius:15px;
background:cyan;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.typing{
color:gray;
font-size:13px;
padding-left:5px;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:600px){

.ai-box{
height:95vh;
}

.header h1{
font-size:28px;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="ai-box">

<div class="header">
<h1>🤖 Mathes Nova AI</h1>
<p>Elite AI Assistant • Smart • Fast • Futuristic</p>
</div>

<div class="chat-area" id="chatArea">

<div class="message bot">
🚀 Welcome to Mathes Nova AI <br>
Your futuristic AI assistant is online.<br>
Ask me anything ✨
</div>

</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script>

const chatArea = document.getElementById("chatArea");
const input = document.getElementById("userInput");

// 🔑 YOUR GEMINI API KEY
const API_KEY = "AIzaSyAUenezXCJRKOAzRdxW4ZbzKaFXHuqFNcI";

async function sendMessage(){

const text = input.value.trim();

if(text === "") return;

chatArea.innerHTML += `
<div class="message user">${text}</div>
`;

chatArea.innerHTML += `
<div class="typing" id="typing">Mathes AI typing...</div>
`;

chatArea.scrollTop = chatArea.scrollHeight;

input.value = "";

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:text
}
]
}
]
})
}
);

const data = await response.json();

console.log(data);

let reply = "⚠️ No response from AI.";

if(data.candidates){
reply = data.candidates[0].content.parts[0].text;
}

document.getElementById("typing").remove();

chatArea.innerHTML += `
<div class="message bot">${reply}</div>
`;

chatArea.scrollTop = chatArea.scrollHeight;

}

catch(error){

if(document.getElementById("typing")){
document.getElementById("typing").remove();
}

chatArea.innerHTML += `
<div class="message bot">❌ Error connecting to AI.</div>
`;

console.log(error);

}

}

input.addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendMessage();
}

});

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<140;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "cyan";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x<0 || p.x>canvas.width) p.dx *= -1;
if(p.y<0 || p.y>canvas.height) p.dy *= -1;

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
  </html>
