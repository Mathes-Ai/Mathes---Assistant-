<!DOCTYPE html>
<html>
<head>
<title>Mathes Nova AI</title>
<style>
body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:90%;
max-width:600px;
background:#111;
padding:20px;
border-radius:20px;
}

#chat{
height:400px;
overflow:auto;
margin-bottom:10px;
}

input{
width:70%;
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>🤖 Mathes Nova AI</h1>

<div id="chat">
<p>🚀 AI Ready...</p>
</div>

<input id="msg" placeholder="Ask anything">
<button onclick="send()">Send</button>

</div>

<script>

const API_KEY = "AIzaSyAUenezXCJRKOAzRdxW4ZbzKaFXHuqFNcI";

async function send(){

let text = document.getElementById("msg").value;

document.getElementById("chat").innerHTML +=
"<p><b>You:</b> "+text+"</p>";

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:text}
]
}
]
})
}
);

const data = await response.json();

console.log(data);

let reply = "No response";

if(data.candidates){
reply = data.candidates[0].content.parts[0].text;
}

document.getElementById("chat").innerHTML +=
"<p><b>AI:</b> "+reply+"</p>";

}

</script>

</body>
</html>
