<!DOCTYPE html>
<html>
<head>
<title>Mathes Nova AI</title>

<style>

body{
background:#050505;
font-family:Arial;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:700px;
height:90vh;
background:#111;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
border:1px solid #222;
}

.header{
padding:20px;
text-align:center;
background:#0d0d0d;
}

.header h1{
color:cyan;
margin:0;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:14px;
margin:10px 0;
border-radius:15px;
max-width:85%;
line-height:1.5;
}

.bot{
background:#1d1d1d;
}

.user{
background:cyan;
color:black;
margin-left:auto;
font-weight:bold;
}

.input-area{
display:flex;
padding:15px;
background:#0d0d0d;
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#1b1b1b;
color:white;
font-size:16px;
}

button{
padding:15px;
margin-left:10px;
border:none;
border-radius:12px;
background:cyan;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<div class="header">
<h1>🤖 Mathes Nova AI</h1>
</div>

<div id="chat">

<div class="msg bot">
🚀 Welcome to Mathes Nova AI
</div>

</div>

<div class="input-area">

<input id="text" placeholder="Ask anything...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const API_KEY = "AIzaSyCkXxAwclbh1iPIwESih_posvOEWiKNzN8";

async function sendMessage(){

const input = document.getElementById("text");
const chat = document.getElementById("chat");

const text = input.value.trim();

if(!text) return;

chat.innerHTML += `
<div class="msg user">${text}</div>
`;

input.value = "";

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:text
}
]
}
]
})
}
);

const data = await response.json();

let reply = "No response";

if(data.candidates){
reply = data.candidates[0].content.parts[0].text;
}

chat.innerHTML += `
<div class="msg bot">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

}

catch(error){

chat.innerHTML += `
<div class="msg bot">❌ Error connecting AI</div>
`;

console.log(error);

}

}

</script>

</body>
  </html>
